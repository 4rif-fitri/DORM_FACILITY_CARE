	<script>
		let loading = `<div class="_loading-container"><h1>Loading...</h1></div>`;
		$("body").prepend(loading);

		let delay = time => new Promise(resolve => setTimeout(resolve, time));

		$(document).ready(async () => {
			await delay(1000);
			$("._loading-container").remove();
		})
