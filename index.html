<!DOCTYPE html>
<html lang="en">

<head>

	<script src="./lib/jquery.js"></script>
</head>

<body>
	<input hidden type="checkbox" name="_mobile-sideBar" id="_mobile-sideBar">

	<section class="_workspace">

		<header class="_navbar">
			<article>

		</header>

		<!-- CONTENT HERE -->
		<main class="_content-area">

			<div class="index-container">

				<section class="right _dekstop">
					<div>
						<form action="" method="post">
							<article>
								<h1>Welcome Back !</h1>
								<p>Lorem, ipsum dolor</p>
							</article>

							<div class="input-control">
								<label for="email">Email</label>
								<input required placeholder="Your emaill" type="email" name="email" id="email">
							</div>

							<div class="input-control">
								<label for="password">Password</label>
								<input required placeholder="Your password" type="password" name="password"
									id="password">
							</div>

							<div class="input-control">
								<button type="submit" class="btn">Log in</button>
							</div>
							<div class="input-control">
								<a href="./pages/user/dashboard.html">user</a>
								<a href="./pages/system-admin/dashboard.html">system admin</a>
								<a href="./pages/contractor/dashboard.html">contractor</a>
								<a href="./pages/college-admin/dashboard.html">college admin</a>
							</div>
						</form>
					</div>

				</section>

				<section class="left ">

					<div class="headline">
						<h1 class="text">Lorem ipsum dolor</h1>
						<h1 class="text2">Lorem ipsum</h1>
					</div>

				</section>
			</div>

		</main>
		<!-- CONTENT HERE -->

	</section>



	<aside class="_sidebar-_mobile _sidebar _mobile">


		<!-- CONTENT HERE -->
		<main class="_content-area">

			<div>
				<form action="" method="post">
					<article>
						<h1>Welcome Back !</h1>
						<p>Lorem, ipsum dolor</p>
					</article>

					<div class="input-control">
						<label for="email">Email</label>
						<input required placeholder="Your Email" type="email" name="email" id="email">
					</div>

					<div class="input-control">
						<label for="password">Password</label>
						<input required placeholder="Your password" type="password" name="password" id="password">
					</div>

					<div class="input-control">
						<button type="submit" class="btn btn-submit">Log in</button>
					</div>
					<div class="input-control">
						<a href="./pages/user/dashboard.html">user</a>
						<a href="./pages/system-admin/dashboard.html">system admin</a>
						<a href="./pages/contractor/dashboard.html">contractor</a>

					</div>
				</form>
			</div>

		</main>
		<!-- CONTENT HERE -->

	</aside>


	<script>
		let loading = `<div class="_loading-container"><img width="200" src="./images/Loading_icon.gif" alt=""></div>`;
		$("body").prepend(loading);

		let delay = time => new Promise(resolve => setTimeout(resolve, time));

		$(document).ready(async () => {
			await delay(1000);
			$("._loading-container").remove();
		})

		document.addEventListener("submit", e => {
			e.preventDefault();
			let from = e.target

			let inputs = from.querySelectorAll("input")

			for (let input of inputs) {
				if (input.value.trim() == "") {
					input.focus()
					return
				}
			}



		})

	</script>
</body>

</html>
