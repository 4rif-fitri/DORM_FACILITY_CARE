	<script>

		let canvas_catagory = document.getElementById("canvas_pieChart");
		let canvas_Block = document.getElementById("canvas_barGraphBlock");
		let canvas_Trand = document.getElementById("canvas_barGraphTrand");
		let canvas_Status = document.getElementById("canvas_donutBar");
		let resizeTimer;
		let rect = canvas_catagory.getBoundingClientRect();


		let drawPieChart = canvas => {
			let ctx = canvas.getContext("2d")


			canvas.width = rect.width;
			canvas.height = rect.height;

			let width = rect.width;
			let height = rect.height;

			let centerX = width / 2;
			let centerY = height / 2;

			let datas = [10, 20, 30, 40, 50, 60];

			let colors = [
				"red",
				"lightcoral",
				"blue",
				"navy",
				"lightblue",
				"skyblue"
			];

			let total = datas.reduce((a, b) => a + b, 0);

			let radius = Math.min(width, height) * 0.35;

			let startAngle = 0;

			datas.forEach((data, index) => {

				let sliceAngle = (data / total) * Math.PI * 2;

				ctx.beginPath();
				ctx.moveTo(centerX, centerY);

				ctx.fillStyle = colors[index];

				ctx.arc(
					centerX,
					centerY,
					radius,
					startAngle,
					startAngle + sliceAngle
				);

				ctx.closePath();
				ctx.fill();

				ctx.strokeStyle = "#000";
				ctx.lineWidth = 1;
				ctx.stroke();

				// Percentage label
				let midAngle = startAngle + sliceAngle / 2;

				let labelX =
					centerX + Math.cos(midAngle) * radius * 0.65;

				let labelY =
					centerY + Math.sin(midAngle) * radius * 0.65;

				let percentage =
					((data / total) * 100).toFixed(1) + "%";

				ctx.font = "bold 16px Arial";
				ctx.textAlign = "center";
				ctx.textBaseline = "middle";

				ctx.strokeStyle = "#000";
				ctx.lineWidth = 3;
				ctx.strokeText(percentage, labelX, labelY);

				ctx.fillStyle = "#fff";
				ctx.fillText(percentage, labelX, labelY);

				startAngle += sliceAngle;
			});
		}

		let drawBarChart = canvas => {
			let ctx = canvas.getContext("2d")
			canvas.width = 700
			canvas.height = 300

			let datas = [10, 50, 90, 70, 30, 50]
			let labels = ["Student 1", "Student 2", "Student 3", "Student 4", "Student 5", "Student 6",]
			let colors = [
				"navy",
				"blue",
				"lightblue",
				"skyblue",
				"lightcoral",
				"red",
			]

			let startX = 50
			let startY = 250
			let max = Math.max(...datas)
			let gap = 30
			let barWidth = 70

			ctx.beginPath()
			ctx.moveTo(startX, startY)
			ctx.lineTo(startX + 600, startY)
			ctx.lineTo(startX, startY)
			ctx.lineTo(startX, startY - 200)

			datas.forEach((value, index) => {
				let barHeight = (value / max) * 200
				let x = startX + gap + index * (barWidth + gap)
				let y = startY - barHeight
				ctx.fillStyle = colors[index]
				ctx.fillRect(x, y, barWidth, barHeight)
				ctx.font = "bold 0.75rem arial"

				ctx.fillText(`${datas[index]} Mark`, x, y - 10)
				ctx.fillText(`${labels[index]} Mark`, x, startY + 15)
			})

			ctx.fillStyle = "#000"
			ctx.lineWidth = 3
			ctx.stroke()
		}

		let drawLineGraph = canvas => {
			let datas = [200, 150, 170, 100, 80, 50, 350, 200, 200, 230]

			let ctx = canvas.getContext("2d")
			canvas.width = rect.width;
			canvas.height = rect.height;

			ctx.strokeStyle = "#fff"
			ctx.lineWidth = 2

			let start_value = datas[0]
			let distense = canvas.width / datas.length
			let start_point = 0

			ctx.beginPath()

			ctx.lineWidth = 5
			ctx.strokeStyle = "red"

			ctx.moveTo(start_point, start_value)
			datas.forEach((velue, index) => {
				let new_distence = start_point + (distense * (index + 1))
				ctx.lineTo(new_distence, velue)
			});

			ctx.lineTo(canvas.width, canvas.height)
			ctx.lineTo(start_point, canvas.height)
			ctx.lineTo(start_point, start_value)

			ctx.fillStyle = "grey"
			ctx.fill()
			ctx.stroke()
		}

		drawPieChart(canvas_catagory);
		drawPieChart(canvas_Block);
		drawLineGraph(canvas_Trand);
		drawBarChart(canvas_Status);

		window.addEventListener("resize", () => {

			clearTimeout(resizeTimer);

			resizeTimer = setTimeout(() => {

				drawPieChart(canvas_catagory);
				drawPieChart(canvas_Block);
				drawLineGraph(canvas_Trand);
				drawBarChart(canvas_Status);

			}, 1000);

		});

	</script>
