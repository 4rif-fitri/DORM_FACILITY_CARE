<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Dorm Faclity Care</title>
	<link rel="stylesheet" href="../../lib/bootstrap.css">
	<script src="../../lib/bootstrap.js"></script>
	<link rel="stylesheet" href="../../style/layout.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
	<script src="../../lib/jquery.js"></script>

	<script src="../../script/load-component.js"></script>

	<!-- your styling -->
	<link rel="stylesheet" href="../../style/pages/system-admin/reportUpdate.css">
</head>

<body>

	<section class="_workspace">

		<!-- CONTENT HERE -->
		<main class="_content-area">

			<div class="progress-container">
				<section>
					<h4>Progress</h4>
					<div class="track-progress">
						<div>

							<article>
								<div class="dot active"></div>
								<div class="desh"></div>
								<div class="dot active"></div>
								<div class="desh"></div>
								<div class="dot "></div>
								<div class="desh"></div>
								<div class="dot"></div>
							</article>
							<article>
								<p class="text-active">Pending</p>
								<p></p>
								<p class="text-active">Review</p>
								<p></p>
								<p>Repair</p>
								<p></p>
								<p>Done</p>
							</article>

						</div>
					</div>

					<article>
						<button class="btn btn-secondary">Reject</button>
						<button class="btn btn-success">Proceed</button>
					</article>
				</section>

			</div>

			<div class="report-detail-container">

				<section>
					<h4>Report Detail</h4>
					<div class="report-detail">

						<div class="input-control">
							<label for="catagory">Catagory</label>
							<input readonly type="text" name="catagory" id="catagory" value="Wifi">
						</div>

						<div class="input-control">
							<label for="description">Description</label>
							<textarea readonly type="text" name="description" id="description">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Quaerat eveniet, cupiditate quis odit ipsum eum quae enim sequi veritatis non ratione? Quia veniam nulla nisi illum accusantium voluptates ducimus laboriosam.
							</textarea>
						</div>

						<div class="input-control">
							<label for="college">College</label>
							<input readonly type="text" name="college" id="college" value="Al Jazari">
						</div>

						<div class="input-control">
							<label for="room">Room</label>
							<input readonly type="text" name="room" id="room" value="B-4-5-B(2)">
						</div>
					</div>

				</section>

			</div>

			<div class="comment-container">
				<section>
					<h4>Comment</h4>
					<div class="chat">
						<div class="other">
							<p>USer</p>
							Mana Wifi
						</div>
						<div class="me">
							<p>Me</p>
							Sabo
						</div>
					</div>

					<div class="comment">
						<div class="input-control">
							<label for="description">Comment</label>
							<textarea type="text" name="description" id="description"></textarea>
						</div>
					</div>

					<article>
						<button class="btn btn-success">Submit</button>
					</article>
				</section>
			</div>

			<div class="contractor-container">
				<section>
					<h4>Contractor</h4>

					<div class="comment">
						<div class="input-control">
							<label for="selectContractor">Select contractor</label>
							<select name="selectContractor" id="selectContractor">
								<option disabled selected value="">Select contractor</option>
								<option value="0">En lorem</option>
								<option value="1">En Ipsum</option>
								<option value="2">En Dolor</option>
								<option value="3">En Sit</option>
							</select>
							<p class="hidden my-2" id="emailContractor">lorem@gamail.com</p>
							<p class="hidden mb-2" id="phoneContractor">0197231577</p>
							<p class="hidden mb-2" id="cTypeContractor">IT technician</p>
						</div>
					</div>

					<article>
						<button class="btn btn-success">Assign</button>
					</article>
				</section>
			</div>

			<div class="image-container">
				<section>
					<h4>Report Image</h4>

					<div class="image">
						<img src="../../images/LogoUTeM-5b80a51b.png" alt="">
					</div>
				</section>
			</div>

		</main>
		<!-- CONTENT HERE -->

	</section>

	<div class="modal fade" id="model">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">
				<img class="modal-image" src="" alt="">
			</div>
		</div>
	</div>

	<!-- your script -->
	<script>
		let selectContractor = document.querySelector("#selectContractor")
		let textEmailContractor = document.getElementById("emailContractor")
		let textphoneContractor = document.getElementById("phoneContractor")
		let textcTypeContractor = document.getElementById("cTypeContractor")
		
		let model = document.getElementById("model")
		let myModal = new bootstrap.Modal(model)

		let images = document.querySelectorAll(".image")

		let prew = url => {
			// console.log(url);
			document.querySelector(".modal-image").src = url 
			myModal.show()
		}

		images.forEach(image => image.addEventListener("click", e => prew(e.target.src)))

		let dataContractor = [
			{ id: 0, name: "En Lorem", email: "dopymonster@gmail.com", no: "0197231577", cType: "IT Tech" },
			{ id: 1, name: "En Ipsum", email: "dopymonster@gmail.com", no: "0197231577", cType: "Mekanik" },
			{ id: 2, name: "En Dolor", email: "dopymonster@gmail.com", no: "0197231577", cType: "Jamban" },
			{ id: 3, name: "En Sit", email: "dopymonster@gmail.com", no: "0197231577", cType: "Kipas" },
		]

		selectContractor.addEventListener("change", e => {
			let id = Number(e.target.value)
			console.log(id);

			let orang = dataContractor.find(data => data.id == id)

			textEmailContractor.classList.remove("hidden")
			textphoneContractor.classList.remove("hidden")
			textcTypeContractor.classList.remove("hidden")

			textEmailContractor.textContent = orang.email
			textphoneContractor.textContent = orang.no
			textcTypeContractor.textContent = orang.cType
		})

	</script>


	<input type="checkbox" hidden style="position: absolute; z-index: 10;" name="_dekstop-sideBar"
		id="_dekstop-sideBar">
	<input type="checkbox" hidden style="position: absolute;" name="_mobile-sideBar" id="_mobile-sideBar">
	<input type="text" name="role" id="role" hidden value="SAD">
	<input type="text" name="title" id="title" hidden value="Update Report">
</body>

</html>
