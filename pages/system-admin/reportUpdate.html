<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Dorm Faclity Care</title>
	<link rel="stylesheet" href="../../lib/bootstrap.css">
	<script src="../../lib/bootstrap.js"></script>
	<link rel="stylesheet" href="../../style/layout.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
	<script src="../../lib/jquery.js"></script>

	<script src="../../script/load-component.js"></script>

	<!-- your styling -->
	<link rel="stylesheet" href="../../style/pages/system-admin/reportUpdate.css">
</head>

<body>

	<section class="_workspace">

		<!-- CONTENT HERE -->
		<main class="_content-area">

			<div class="progress-container">
				<section>
					<h4>Progress</h4>
					<div class="track-progress">

					</div>

					<article>
						<button class="btn btn-secondary">Reject</button>
						<button class="btn btn-success">Proceed</button>
					</article>
				</section>

			</div>

			<div class="report-detail-container">

				<section>
					<h4>Report Detail</h4>
					<div class="report-detail">

						<div class="input-control">
							<label for="catagory">Catagory</label>
							<input type="text" name="catagory" id="catagory">
						</div>

						<div class="input-control">
							<label for="description">Description</label>
							<textarea type="text" name="description" id="description"></textarea>
						</div>

						<div class="input-control">
							<label for="college">College</label>
							<input type="text" name="college" id="college">
						</div>

						<div class="input-control">
							<label for="room">Room</label>
							<input type="text" name="room" id="room">
						</div>
					</div>

					<article>
						<button class="btn btn-success">Forward</button>
					</article>
				</section>

			</div>

			<div class="comment-container">
				<section>
					<h4>Comment</h4>
					<div class="comment">

					</div>

					<article>
						<button class="btn btn-success">Submit</button>
					</article>
				</section>

			</div>

		</main>
		<!-- CONTENT HERE -->

	</section>

	<!-- your script -->
	<script>

	</script>


	<input type="checkbox" hidden style="position: absolute; z-index: 10;" name="_dekstop-sideBar"
		id="_dekstop-sideBar">
	<input type="checkbox" hidden style="position: absolute;" name="_mobile-sideBar" id="_mobile-sideBar">
	<input type="text" name="role" id="role" hidden value="SAD">
	<input type="text" name="title" id="title" hidden value="Update Report">
</body>

</html>
