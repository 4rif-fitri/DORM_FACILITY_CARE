<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Dorm Faclity Care</title>
	<link rel="stylesheet" href="../../lib/bootstrap.css">
	<script src="../../lib/bootstrap.js"></script>
	<link rel="stylesheet" href="../../style/layout.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
	<script src="../../lib/jquery.js"></script>

	<script src="../../script/load-component.js"></script>

	<!-- your styling -->
	<link rel="stylesheet" href="../../style/pages/user/newReport.css">
</head>

<body>

	<section class="_workspace">

		<!-- CONTENT HERE -->
		<main class="_content-area">
			<h2>Details</h2>
			<form action="">
				<div class="form-group">
					<div class="form-element">
						<label for="category">Category</label>
						<select id="category" name="category">
							<option>Furniture</option>
							<option>Electrical</option>
							<option>Plumbing</option>
							<option>Wi-Fi</option>
						</select>
					</div>
					<div class="form-element">
						<label for="desc">Description</label>
						<textarea id="desc" name="desc"></textarea>
					</div>
					<div class="form-group-inner">
						<div class="form-element">
							<label for="location">Location</label>
							<select id="location" name="location">
								<option>Al-Jazari</option>
								<option>Satria</option>
							</select>
						</div>
						<div class="form-element">
							<label for="block">Block</label>
							<select id="block" name="block">
								<option>A</option>
								<option>B</option>
								<option>C</option>
								<option>Tuah</option>
								<option>Jebat</option>
							</select>
						</div>
						<div class="form-element">
							<label for="floor">Floor</label>
							<input type="number" id="floor" name="floor">
						</div>
					</div>
					<div class="form-element">
						<label for="room">Room no.</label>
						<input type="text" id="room" name="room">
					</div>
				</div>
				<div class="form-group">
					<h3>Upload image</h3>
					<img src="../../images/logo.png">
				</div>
			</form>
		</main>
		<!-- CONTENT HERE -->

	</section>

	<!-- your script -->
	<script>

	</script>


	<input type="checkbox" hidden style="position: absolute; z-index: 10;" name="_dekstop-sideBar"id="_dekstop-sideBar">
	<input type="checkbox" hidden style="position: absolute;" name="_mobile-sideBar" id="_mobile-sideBar">
	<input type="text" name="role" id="role" hidden value="USER">
	<input type="text" name="title" id="title" hidden value="New Report">
</body>

</html>
