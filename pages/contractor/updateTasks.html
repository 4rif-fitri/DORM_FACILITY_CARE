<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Dorm Faclity Care</title>
	<link rel="stylesheet" href="../../lib/bootstrap.css">
	<script src="../../lib/bootstrap.js"></script>
	<link rel="stylesheet" href="../../style/layout.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
	<script src="../../lib/jquery.js"></script>

	<script src="../../script/load-component.js"></script>

	<!-- your styling -->
	<link rel="stylesheet" href="../../style/pages/contractor/updateTasks.css">
</head>

<body>

	<section class="_workspace">

		<!-- CONTENT HERE -->
		<main class="_content-area">

			<section>

				<div class="progress-container">
					<section>
						<h4>Progress</h4>
						<div class="track-progress">
							<div>

								<article>
									<div class="dot active"></div>
									<div class="desh"></div>
									<div class="dot active"></div>
									<div class="desh"></div>
									<div class="dot "></div>
									<div class="desh"></div>
									<div class="dot"></div>
								</article>
								<article>
									<p class="text-active">Pending</p>
									<p></p>
									<p class="text-active">Review</p>
									<p></p>
									<p>Repair</p>
									<p></p>
									<p>Done</p>
								</article>

							</div>
						</div>

						<article>
							<button class="btn btn-secondary">Back</button>
							<button class="btn btn-success">Done</button>
						</article>
					</section>

				</div>

				<div class="report-detail-container">

					<section>
						<h4>Report Detail</h4>
						<div class="report-detail">

							<div class="input-control">
								<label for="catagory">Catagory</label>
								<input readonly type="text" name="catagory" id="catagory">
							</div>

							<div class="input-control">
								<label for="description">Description</label>
								<textarea readonly type="text" name="description" id="description"></textarea>
							</div>

							<div class="input-control">
								<label for="college">College</label>
								<input readonly type="text" name="college" id="college">
							</div>

							<div class="input-control">
								<label for="room">Room</label>
								<input readonly type="text" name="room" id="room">
							</div>
						</div>

					</section>

				</div>

				<div class="comment-container">
					<section>
						<h4>Comment</h4>
						<div class="chat">
							<div class="other">
								<p>USer</p>
								Mana Wifi
							</div>
							<div class="me">
								<p>Me</p>
								Sabo
							</div>
						</div>

						<div class="comment">
							<div class="input-control">
								<label for="description">Comment</label>
								<textarea type="text" name="description" id="description"></textarea>
							</div>
						</div>

						<article>
							<button class="btn btn-success">Submit</button>
						</article>
					</section>
				</div>

				<div class="insert-image-container">
					<div class="input-control">						
						<label for="image" class="required"><h4>Upload Image</h4></label>
						<input hidden type="file" accept="image/*" name="image" id="image">
						<label for="image" class="image-area">
							<button type="button" class="btn btn-close hidden"></button>
	
							<article>
								<i class="fa-solid fa-file-arrow-up"></i>
								<h5 class="text-drop">Click or Drop Image Here!</h5>
							</article>
	
						</label>
						<p class="hidden name-file">asd.png</p>
	
					</div>
				</div>


				<div class="image-container">
					<section>
						<h4>Report Image</h4>

						<div class="image">
							<img src="../../images/LogoUTeM-5b80a51b.png" alt="">
						</div>
					</section>
				</div>

			</section>

		</main>
		<!-- CONTENT HERE -->

	</section>

	<!-- your script -->
	<script>

	</script>


	<input type="checkbox" hidden style="position: absolute; z-index: 10;" name="_dekstop-sideBar"
		id="_dekstop-sideBar">
	<input type="checkbox" hidden style="position: absolute;" name="_mobile-sideBar" id="_mobile-sideBar">
	<input type="text" name="role" id="role" hidden value="CTR">
	<input type="text" name="title" id="title" hidden value="Update Tasks">
</body>

</html>
